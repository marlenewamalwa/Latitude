<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<title>Latest Blog Posts - Latitude Digital</title>

<style>

* {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-purple: #6D2FFF;
            --accent-pink: #FF6B9D;
            --accent-yellow: #FFD60A;
            --dark-bg: #FFFFFF;
            --darker-bg: #F8F8FC;
            --card-bg: #FFFFFF;
            --text-primary: #1A1A2E;
            --text-secondary: #6B6B7F;
            --gradient-1: linear-gradient(135deg, #6D2FFF 0%, #C733FF 100%);
            --gradient-2: linear-gradient(135deg, #FF6B9D 0%, #FFD60A 100%);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            font-weight: 400;
            background-color: var(--dark-bg);
            color: var(--text-primary);
            line-height: 1.8;
            overflow-x: hidden;
        }

  /* Header & Navigation */
            header {
                position: fixed;
                top: 0;
                width: 100%;
                z-index: 1000;
                background: rgba(255, 255, 255, 0.98);
                backdrop-filter: blur(10px);
                border-bottom: 1px solid rgba(0, 0, 0, 0.05);
            }

            nav {
                max-width: 1400px;
                margin: 0 auto;
                padding: 1.5rem 2rem;
                display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            text-decoration: none;
        }

        .logo img {
            height: 30px;
            width: auto;
            display: block;
            object-fit: contain;
        }

        /* Fallback if image fails to load */
        .logo-fallback {
            font-size: 1.5rem;
            font-weight: 200;
            letter-spacing: 0.05em;
            background: var(--gradient-1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .nav-links {
            display: flex;
            gap: 2.5rem;
            list-style: none;
        }

        .nav-links a {
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: 300;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: var(--text-primary);
        }

        .cta-button {
            background: var(--gradient-1);
            color: white;
            padding: 0.75rem 2rem;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 400;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .cta-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(109, 47, 255, 0.3);
        }

#featured-post{
max-width:1400px;
margin:120px auto 20px auto;
padding:0 6%;
}

.featured-blog{
display:grid;
grid-template-columns:1fr 1fr;
border-radius:20px;
overflow:hidden;
box-shadow:0 8px 32px rgba(0,0,0,0.08);
}

.featured-img{
width:100%;
height:100%;
object-fit:cover;
}

.featured-content{
padding:40px;
background:#fff;
display:flex;
flex-direction:column;
justify-content:center;
}

.featured-content h2{
font-size:2rem;
margin-bottom:15px;
}

.featured-read-more{
display:inline-block;
margin-top:20px;
background:#6D2FFF;
color:white;
padding:12px 26px;
border-radius:10px;
text-decoration:none;
}

#rss-feed{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
gap:30px;
padding:60px 6%;
max-width:1400px;
margin:auto;
}

.post{
border:1px solid rgba(0,0,0,0.06);
border-radius:16px;
overflow:hidden;
background:#fff;
}

.post-img{
width:100%;
height:200px;
object-fit:cover;
}

.post-content{
padding:20px;
}

.post h2{
font-size:1.2rem;
margin-bottom:10px;
}

.post p{
color:#666;
font-size:0.9rem;
}

.read-more{
display:inline-block;
margin-top:15px;
background:#6D2FFF;
color:white;
padding:10px 18px;
border-radius:8px;
text-decoration:none;
}

.loading{
text-align:center;
padding:80px;
color:#777;
}

</style>
</head>

<body>

 <header>
        <nav>
            <a href="index.html" class="logo" aria-label="Latitude Digital - Home">
                <!-- 📌 REPLACE src below with your actual logo image path, e.g. src="images/logo.png" -->
                <img 
                    src="images/Revision2(png).png" 
                    alt="Latitude Digital Logo"
                    onerror="this.style.display='none'; this.nextElementSibling.style.display='block';"
                />
                <span class="logo-fallback" style="display:none;">Latitude</span>
            </a>
            <ul class="nav-links">
                <li><a href="#services">Services</a></li>
                <li><a href="#clients">Clients</a></li>
                <li><a href="#case-studies">Work</a></li>
                <li><a href="#about">About</a></li>
                <li><a href="blog.html">Blog</a></li>
            </ul>
           <button onclick="openContactModal()" class="cta-button" style="display: inline-block; margin-bottom: 2rem; border: none; cursor: pointer; font-family: inherit; font-size: 1rem;">Get Started</button>
            <button class="hamburger" id="hamburger" aria-label="Toggle menu">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </nav>
    </header>

<div id="featured-post"></div>
<div id="rss-feed" class="loading">Loading blog posts...</div>

<script>

async function loadRSS(){

const container=document.getElementById("rss-feed")
const featuredContainer=document.getElementById("featured-post")

try{

const response=await fetch("/api/rss")
const xmlText=await response.text()

const parser=new DOMParser()
const xml=parser.parseFromString(xmlText,"text/xml")

const items=[...xml.querySelectorAll("item")]

if(items.length===0){
container.innerHTML="No blog posts found"
return
}

const featuredPost=items[0]
const posts=items.slice(1)

function getText(item,tag){
const el=item.querySelector(tag)
return el?el.textContent:""
}

function getImage(item){
const enclosure=item.querySelector("enclosure")
if(enclosure) return enclosure.getAttribute("url")

const match=getText(item,"description").match(/<img.*?src="(.*?)"/)
return match?match[1]:""
}

const featuredImage=getImage(featuredPost)

featuredContainer.innerHTML=`

<div class="featured-blog">

${featuredImage?`<img src="${featuredImage}" class="featured-img">`:""}

<div class="featured-content">

<h2>
<a href="${getText(featuredPost,"link")}" target="_blank">
${getText(featuredPost,"title")}
</a>
</h2>

<p>
${getText(featuredPost,"description").replace(/<[^>]+>/g,"").substring(0,200)}...
</p>

<a href="${getText(featuredPost,"link")}" target="_blank" class="featured-read-more">
Read Article
</a>

</div>
</div>
`

container.innerHTML=""

posts.slice(0,12).forEach(item=>{

const image=getImage(item)

const post=document.createElement("div")
post.className="post"

post.innerHTML=`

${image?`<img src="${image}" class="post-img">`:""}

<div class="post-content">

<h2>
<a href="${getText(item,"link")}" target="_blank">
${getText(item,"title")}
</a>
</h2>

<p>
${getText(item,"description").replace(/<[^>]+>/g,"").substring(0,120)}...
</p>

<a href="${getText(item,"link")}" target="_blank" class="read-more">
Read More
</a>

</div>
`

container.appendChild(post)

})

}catch(err){

container.innerHTML="Unable to load blog posts."

}

}

loadRSS()

</script>

</body>
</html>
