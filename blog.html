<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="images/favicon.jpg">
  <title>Latest Blog Posts - Latitude Digital</title>
  <style>
    * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-purple: #6D2FFF;
            --accent-pink: #FF6B9D;
            --accent-yellow: #FFD60A;
            --dark-bg: #FFFFFF;
            --darker-bg: #F8F8FC;
            --card-bg: #FFFFFF;
            --text-primary: #1A1A2E;
            --text-secondary: #6B6B7F;
            --gradient-1: linear-gradient(135deg, #6D2FFF 0%, #C733FF 100%);
            --gradient-2: linear-gradient(135deg, #FF6B9D 0%, #FFD60A 100%);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            font-weight: 400;
            background-color: var(--dark-bg);
            color: var(--text-primary);
            line-height: 1.8;
            overflow-x: hidden;
        }

        /* Header & Navigation */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }

        nav {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            text-decoration: none;
        }

        .logo img {
            height: 30px;
            width: auto;
            display: block;
            object-fit: contain;
        }

        /* Fallback if image fails to load */
        .logo-fallback {
            font-size: 1.5rem;
            font-weight: 200;
            letter-spacing: 0.05em;
            background: var(--gradient-1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .nav-links {
            display: flex;
            gap: 2.5rem;
            list-style: none;
        }

        .nav-links a {
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: 300;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: var(--text-primary);
        }

        .cta-button {
            background: var(--gradient-1);
            color: white;
            padding: 0.75rem 2rem;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 400;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .cta-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(109, 47, 255, 0.3);
        }
     @media (max-width: 768px) {
            .hamburger {
                display: flex;
            }

            .nav-links {
                display: none;
            }

            nav > .cta-button {
                display: none;
            }}


    /* Featured post */
    #featured-post { max-width:1400px; margin:0 auto; padding:40px 6% 20px 6%; }
    .featured-blog { display:grid; grid-template-columns:1fr 1fr; gap:0; border-radius:20px; overflow:hidden; box-shadow:0 8px 32px rgba(107,61,253,0.12); position:relative; transition:all 0.4s; }
    .featured-blog:hover { transform:translateY(-4px); box-shadow:0 16px 48px rgba(107,61,253,0.2);}
    .featured-img-wrapper { position:relative; height:100%; min-height:400px; overflow:hidden; }
    .featured-img { width:100%; height:100%; object-fit:cover; transition:transform 0.6s; }
    .featured-blog:hover .featured-img { transform:scale(1.05); }
    .featured-content { padding:48px 44px; display:flex; flex-direction:column; justify-content:center; background:#fff; }
    .featured-content h2 { font-size:2rem; margin-bottom:20px; }
    .featured-content h2 a { text-decoration:none; color:inherit; }
    .featured-content h2 a:hover { color:#6b3dfd; }
    .featured-excerpt { font-size:1.05rem; color:#666; margin-bottom:28px; }
    .featured-read-more { display:inline-flex; align-items:center; gap:12px; color:#fff; background:linear-gradient(135deg,#6b3dfd 0%,#5a2eea 100%); padding:14px 32px; border-radius:12px; text-decoration:none; font-weight:600; }
    .featured-read-more::after { content:'→'; font-size:1.2rem; transition:transform 0.3s; }
    .featured-read-more:hover { background:linear-gradient(135deg,#5a2eea 0%,#4e2bd6 100%); transform:translateX(4px); }
    .featured-read-more:hover::after { transform:translateX(6px); }

    /* Blog grid */
    #rss-feed { display:grid; grid-template-columns:repeat(auto-fill,minmax(340px,1fr)); gap:32px; padding:60px 6%; min-height:60vh; max-width:1400px; margin:0 auto; }
    .post { background:#fff; border:1px solid rgba(107,61,253,0.08); border-radius:16px; display:flex; flex-direction:column; transition:all 0.4s; }
    .post:hover { transform:translateY(-8px); box-shadow:0 12px 32px rgba(107,61,253,0.15); border-color:rgba(107,61,253,0.2); }
    .post-img-wrapper { height:220px; overflow:hidden; }
    .post-img { width:100%; height:100%; object-fit:cover; transition:transform 0.5s; }
    .post:hover .post-img { transform:scale(1.08); }
    .post-content { padding:24px; display:flex; flex-direction:column; flex-grow:1; }
    .post h2 { margin-bottom:12px; font-size:1.25rem; font-weight:600; }
    .post h2 a { text-decoration:none; color:#252f3f; }
    .post h2 a:hover { color:#6b3dfd; }
    .post p { font-size:0.95rem; color:#666; margin-bottom:auto; }
    .read-more { display:inline-flex; align-items:center; gap:8px; margin-top:20px; padding:12px 24px; border-radius:10px; color:#fff; background:linear-gradient(135deg,#6b3dfd 0%,#5a2eea 100%); text-decoration:none; font-weight:600; }
    .read-more:hover { background:linear-gradient(135deg,#5a2eea 0%,#4e2bd6 100%); }

    .loading { text-align:center; padding:80px 20px; font-size:1.1rem; color:#666; }
    html { scroll-behavior:smooth; }
  </style>
</head>
<body>

 <header>
        <nav>
            <a href="index.html" class="logo" aria-label="Latitude Digital - Home">
                <!-- 📌 REPLACE src below with your actual logo image path, e.g. src="images/logo.png" -->
                <img 
                    src="images/Revision2(png).png" 
                    alt="Latitude Digital Logo"
                    onerror="this.style.display='none'; this.nextElementSibling.style.display='block';"
                />
                <span class="logo-fallback" style="display:none;">⚡ Latitude</span>
            </a>
            <ul class="nav-links">
                <li><a href="#services">Services</a></li>
                <li><a href="#clients">Clients</a></li>
                <li><a href="#case-studies">Work</a></li>
                <li><a href="#about">About</a></li>
                <li><a href="blog.html">Blog</a></li>
            </ul>
            <a href="#contact" class="cta-button">Get Started</a>
            <button class="hamburger" id="hamburger" aria-label="Toggle menu">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </nav>
    </header>

    <!-- Mobile Menu Overlay -->
    <div class="mobile-menu" id="mobileMenu">
        <a href="#services" class="mobile-nav-link">Services</a>
        <a href="#clients" class="mobile-nav-link">Clients</a>
        <a href="#case-studies" class="mobile-nav-link">Work</a>
        <a href="#about" class="mobile-nav-link">About</a>
        <a href="#contact" class="cta-button mobile-nav-link">Get Started</a>
         <li><a href="blog.html">Blog</a></li>
    </div>

<div id="featured-post"></div>
<div id="rss-feed" class="loading">Loading blog posts...</div>

<script>
  // Navbar scroll effect
  window.addEventListener('scroll', () => {
    const navbar = document.getElementById('navbar');
    window.scrollY > 50 ? navbar.classList.add('scrolled') : navbar.classList.remove('scrolled');
  });

  async function loadRSS() {
    const feedUrl = 'https://latitudeltd12.wixstudio.com/latitudeblog/blog-feed.xml';
    const proxy = 'https://api.allorigins.win/raw?url=';
    const postsPerPage = 6;
    let currentPage = 1;
    let posts = [];
    let featuredPost = null;

    const container = document.getElementById('rss-feed');
    const featuredContainer = document.getElementById('featured-post');

    try {
      const response = await fetch(proxy + encodeURIComponent(feedUrl));
      const xmlText = await response.text();
      const parser = new DOMParser();
      const xml = parser.parseFromString(xmlText, "text/xml");
      const items = Array.from(xml.querySelectorAll("item"));

      if (items.length === 0) {
        container.innerHTML = '<p class="loading">No blog posts found.</p>';
        return;
      }

      // First post as featured
      featuredPost = items[0];
      posts = items.slice(1);

      function getText(item, tag) { 
        const el = item.querySelector(tag); 
        return el ? el.textContent : ''; 
      }

      function getImage(item) {
        const enclosure = item.querySelector('enclosure');
        if (enclosure && enclosure.getAttribute('url')) return enclosure.getAttribute('url');
        const match = getText(item,'description').match(/<img.*?src="(.*?)"/);
        return match ? match[1] : '';
      }

      function renderFeaturedPost() {
        const imageUrl = getImage(featuredPost);
        const excerpt = getText(featuredPost,'description').replace(/<[^>]+>/g,'').substring(0,200);

        featuredContainer.innerHTML = `
          <div class="featured-blog">
            ${imageUrl ? `<div class="featured-img-wrapper"><div class="featured-badge">Featured</div>
            <a href="${getText(featuredPost,'link')}" target="_blank"><img src="${imageUrl}" alt="${getText(featuredPost,'title')}" class="featured-img" loading="eager"></a></div>` : ''}
            <div class="featured-content">
              <h2><a href="${getText(featuredPost,'link')}" target="_blank">${getText(featuredPost,'title')}</a></h2>
              <p class="featured-excerpt">${excerpt}...</p>
              <a href="${getText(featuredPost,'link')}" class="featured-read-more" target="_blank">Read Full Article</a>
            </div>
          </div>`;
      }

      function renderPage(page) {
        container.innerHTML = '';
        container.classList.remove('loading');

        if (!document.querySelector('.section-title')) {
          const title = document.createElement('div');
          title.className = 'section-title';
          title.textContent = 'Latest Articles';
          featuredContainer.parentNode.insertBefore(title, container);
        }

        const start = (page-1)*postsPerPage;
        const end = start + postsPerPage;
        const paginated = posts.slice(start,end);

        paginated.forEach(item => {
          const imageUrl = getImage(item);
          const postDiv = document.createElement('div');
          postDiv.className = 'post';
          postDiv.innerHTML = `
            ${imageUrl ? `<div class="post-img-wrapper"><a href="${getText(item,'link')}" target="_blank"><img src="${imageUrl}" alt="${getText(item,'title')}" class="post-img" loading="lazy"></a></div>` : ''}
            <div class="post-content">
              <h2><a href="${getText(item,'link')}" target="_blank">${getText(item,'title')}</a></h2>
              <p>${getText(item,'description').replace(/<[^>]+>/g,'').substring(0,130)}...</p>
              <a href="${getText(item,'link')}" class="read-more" target="_blank">Read More</a>
            </div>`;
          container.appendChild(postDiv);
        });
      }

      renderFeaturedPost();
      renderPage(currentPage);

    } catch(err) {
      console.error('RSS load failed:', err);
      container.innerHTML = '<p class="loading">Unable to load blog posts.</p>';
    }
  }

  loadRSS();

  function toggleMenu() {
    document.querySelector('.nav-links').classList.toggle('active');
  }
</script>

</body>
</html>
